# MPM prefork configuration optimized for WordPress with limited resources
# This configuration limits the number of Apache processes to prevent CPU saturation

<IfModule mpm_prefork_module>
    # StartServers: number of server processes to start
    StartServers              3

    # MinSpareServers: minimum number of server processes which are kept spare
    MinSpareServers           2

    # MaxSpareServers: maximum number of server processes which are kept spare
    MaxSpareServers           5

    # MaxRequestWorkers: maximum number of server processes allowed to start
    # CRITICAL: This limits simultaneous Apache processes
    # Assuming ~150MB per process, 40 workers = ~6GB
    MaxRequestWorkers         40

    # ServerLimit: upper limit on configurable number of processes
    ServerLimit               40

    # MaxConnectionsPerChild: maximum number of requests a server process serves
    # Setting to 1000 helps prevent memory leaks
    MaxConnectionsPerChild    1000
</IfModule>
