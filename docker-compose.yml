# Docker Compose configuration for WordPress setup
version: "3.9"

services:
  # WordPress application service (conectado a DB de producción)
  wordpress:
    image: fasecolda-wp # Tu imagen personalizada
    container_name: wordpress
    ports:
      # Map host port 8080 to container port 80
      - "8080:80"
    environment:
      # Database connection settings (Base de datos de producción)
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      # Additional WordPress configuration
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_MEMORY_LIMIT','512M');
    volumes:
      # Persist WordPress files and uploads
      - wp_data:/var/www/html

# Named volumes for data persistence
volumes:
  wp_data:    # WordPress files and uploads storage
