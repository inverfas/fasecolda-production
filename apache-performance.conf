# Apache performance optimization for WordPress
# Reduces resource usage and prevents connection buildup

# KeepAlive: allows persistent connections
# Important: Short timeout prevents processes from being held too long
KeepAlive On
MaxKeepAliveRequests 50
KeepAliveTimeout 3

# Timeout settings
Timeout 60

# Disable unnecessary modules and features
# This reduces per-request overhead
HostnameLookups Off

# When behind a reverse proxy (Varnish on :80 → Apache on :8080),
# use the Host header for redirects instead of ServerName:ServerPort
UseCanonicalName Off
UseCanonicalPhysicalPort Off

# Limit request body size to prevent abuse
LimitRequestBody 10485760

# Performance tuning for mod_deflate (if enabled)
<IfModule mod_deflate.c>
    SetOutputFilter DEFLATE
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript
    BrowserMatch ^Mozilla/4 gzip-only-text/html
    BrowserMatch ^Mozilla/4\.0[678] no-gzip
    BrowserMatch \bMSIE !no-gzip !gzip-only-text/html
</IfModule>
